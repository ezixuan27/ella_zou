<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polaroid Scatter Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f7faff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Josefin Sans', sans-serif;
    gap: 3rem;
  }

  p.hint {
    color: #8BB1D1;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .pile {
    position: relative;
    width: 200px;
    height: 220px;
    cursor: pointer;
  }

  .polaroid {
    position: absolute;
    width: 180px;
    background: white;
    padding: 10px 10px 32px 10px;
    box-shadow: 3px 4px 16px rgba(0,0,0,0.15);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
    transform-origin: center center;
    top: 0; left: 0;
    will-change: transform;
  }

  .polaroid img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    display: block;
  }

  .polaroid .label {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: #aaa;
    font-family: 'Segoe UI', sans-serif;
    font-style: italic;
  }

  /* Default stacked state — each card slightly offset + rotated */
  .polaroid:nth-child(1) { transform: rotate(-8deg) translate(-4px, 2px); z-index: 4; }
  .polaroid:nth-child(2) { transform: rotate(4deg)  translate(2px, -3px); z-index: 3; }
  .polaroid:nth-child(3) { transform: rotate(-2deg) translate(5px, 5px);  z-index: 2; }
  .polaroid:nth-child(4) { transform: rotate(10deg) translate(-2px, 4px); z-index: 1; }

  /* Scattered state on hover */
  .pile:hover .polaroid:nth-child(1) {
    transform: rotate(-14deg) translate(-160px, -40px);
    box-shadow: 6px 8px 24px rgba(0,0,0,0.18);
    z-index: 4;
  }
  .pile:hover .polaroid:nth-child(2) {
    transform: rotate(6deg) translate(-60px, -130px);
    box-shadow: 6px 8px 24px rgba(0,0,0,0.18);
    z-index: 3;
  }
  .pile:hover .polaroid:nth-child(3) {
    transform: rotate(-4deg) translate(80px, -120px);
    box-shadow: 6px 8px 24px rgba(0,0,0,0.18);
    z-index: 2;
  }
  .pile:hover .polaroid:nth-child(4) {
    transform: rotate(12deg) translate(170px, -30px);
    box-shadow: 6px 8px 24px rgba(0,0,0,0.18);
    z-index: 1;
  }

  /* Individual card hover — bring to front slightly */
  .polaroid:hover {
    z-index: 10 !important;
    box-shadow: 8px 12px 32px rgba(0,0,0,0.22) !important;
    filter: brightness(1.03);
  }
</style>
</head>
<body>

<p class="hint">hover over the pile ↓</p>

<div class="pile">
  <div class="polaroid">
    <img src="public/mypic.jpeg" alt="me" />
    <span class="label">me :)</span>
  </div>
  <div class="polaroid">
    <img src="public/friends.jpeg" alt="friends" />
    <span class="label">friends</span>
  </div>
  <div class="polaroid">
    <img src="public/candypic.jpg" alt="candy" />
    <span class="label">candy 🐱</span>
  </div>
  <div class="polaroid">
    <img src="public/candysleep.JPG" alt="candy sleeping" />
    <span class="label">candy sleeping</span>
  </div>
</div>

<p class="hint" style="font-size:11px; color: #c0cfe0;">
  more photos → just add more .polaroid divs
</p>

</body>
</html>
